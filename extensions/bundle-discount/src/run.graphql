query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            inCollections(ids: [
              "gid://shopify/Collection/305373970506",
              "gid://shopify/Collection/305374003274",
              "gid://shopify/Collection/305374036042"
            ]) {
              collectionId
              isMember
            }
          }
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "bundle-discount", key: "config") {
      value
    }
  }
}